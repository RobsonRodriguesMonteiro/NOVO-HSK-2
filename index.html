<html lang="pt-BR">
<head>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');
        :root {
            --text-main: #1d1d1f;
            --text-accent: #0066cc;
            --text-muted: #86868b;
            --text-teal: #0d9488;
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f7;
            background-image: radial-gradient(at 20% 0%, hsla(190, 100%, 85%, .9) 0px, transparent 50%), radial-gradient(at 80% 10%, hsla(210, 100%, 88%, .8) 0px, transparent 50%), radial-gradient(at 90% 90%, hsla(160, 100%, 82%, .9) 0px, transparent 50%), radial-gradient(at 10% 90%, hsla(250, 100%, 90%, .8) 0px, transparent 50%), radial-gradient(at 50% 50%, hsla(280, 100%, 92%, .6) 0px, transparent 60%);
            background-size: 200% 200%;
            animation: tahoeShift 25s ease-in-out infinite alternate;
            color: var(--text-main);
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        @keyframes tahoeShift {
            0% {
                background-position:0% 0%
            }

            50% {
                background-position:100% 100%
            }

            100% {
                background-position: 0% 0%
            }
        }

        .chinese-text {
            font-family: 'Noto Sans SC', sans-serif;
        }

        .view-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: opacity .5s cubic-bezier(.25, 1, .5, 1), transform .6s cubic-bezier(.25, 1, .5, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .view-hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(.95);
        }

        .view-active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
            z-index: 10;
        }

        .app-icon {
            border-radius: 22.5%;
            box-shadow: 0 15px 30px rgba(0, 0, 0, .1), inset 0 1px 1px rgba(255, 255, 255, .9), inset 0 -1px 2px rgba(0, 0, 0, .1);
            transition: all .3s cubic-bezier(.25, 1, .5, 1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .app-icon:active {
            transform: scale(.95);
        }

        .glass-folder-icon {
            background: linear-gradient(135deg, rgba(255, 255, 255, .7) 0%, rgba(255, 255, 255, .3) 100%);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, .8);
        }

        .folder-overlay {
            background: rgba(255, 255, 255, .2);
            backdrop-filter: blur(50px) saturate(200%);
            -webkit-backdrop-filter: blur(50px) saturate(200%);
        }

        .folder-container {
            width: 90%;
            max-width: 900px;
            background: rgba(255, 255, 255, .36);
            border-radius: 40px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, .55);
            box-shadow: 0 22px 60px rgba(0, 0, 0, .08);
        }

        .lesson-card {
            background: rgba(255, 255, 255, .42);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, .6);
            border-radius: 28px;
            padding: 24px;
            cursor: pointer;
            transition: all .3s cubic-bezier(.25, 1, .5, 1);
            box-shadow: 0 8px 26px rgba(0, 0, 0, .045);
        }

        .lesson-card:hover {
            transform: translateY(-4px) scale(1.02);
            background: rgba(255, 255, 255, .58);
            box-shadow: 0 14px 34px rgba(0, 0, 0, .07);
        }

        .glass-panel {
            background: rgba(255, 255, 255, .44);
            backdrop-filter: blur(48px) saturate(200%);
            -webkit-backdrop-filter: blur(48px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, .62);
            box-shadow: 0 14px 40px rgba(0, 0, 0, .06);
        }

        .glass-inner {
            background: rgba(255, 255, 255, .38);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, .58);
            box-shadow: 0 6px 22px rgba(0, 0, 0, .035);
        }

        .glass-btn {
            background: rgba(255, 255, 255, .42);
            backdrop-filter: blur(20px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, .6);
            box-shadow: 0 3px 10px rgba(0, 0, 0, .03);
            transition: all .3s cubic-bezier(.25, 1, .5, 1);
            color: var(--text-main);
            cursor: pointer;
        }

        .glass-btn:hover {
            transform: translateY(-1px) scale(1.01);
            background: rgba(255, 255, 255, .6);
            color: var(--text-teal);
        }

        .glass-btn-primary {
            background: linear-gradient(135deg, rgba(204, 251, 241, .6) 0%, rgba(204, 251, 241, .3) 100%);
            border: 1px solid rgba(255, 255, 255, .8);
            color: var(--text-teal);
            font-weight: 700;
            box-shadow: 0 8px 24px rgba(13, 148, 136, .15);
            transition: all .3s cubic-bezier(.25, 1, .5, 1);
        }

        .list-item-glass {
            transition: all .3s cubic-bezier(.25, 1, .5, 1);
            background: rgba(255, 255, 255, .3);
            border: 1px solid rgba(255, 255, 255, .42);
            color: var(--text-main);
        }

        .list-item-glass:hover {
            background: rgba(255, 255, 255, .45);
        }

        .list-item-glass.active {
            background: rgba(255, 255, 255, .62);
            border: 1px solid rgba(255, 255, 255, .75);
            box-shadow: 0 5px 16px rgba(0, 0, 0, .05);
            transform: scale(1.02);
            position: relative;
        }

        .list-item-glass.active::before {
            content: '';
            position: absolute;
            left: -1px;
            top: 10%;
            height: 80%;
            width: 4px;
            background: var(--text-accent);
            border-radius: 4px;
        }

        .mode-tab {
            transition: all .3s ease;
            border: 1px solid transparent;
        }

        .mode-tab:hover {
            background: rgba(255, 255, 255, .3);
        }

        .mode-tab.active {
            background: rgba(255, 255, 255, .75);
            color: var(--text-accent);
            box-shadow: 0 4px 12px rgba(0, 0, 0, .05);
            border: 1px solid rgba(255, 255, 255, .9);
            font-weight: 700;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, .15);
            border-radius: 10px;
        }

        .cat-header {
            cursor: pointer;
            transition: all .2s ease;
            font-weight: 700;
            letter-spacing: .05em;
        }

        .cat-header:hover {
            color: var(--text-accent);
        }

        .cat-list {
            transition: max-height .4s ease-out, opacity .4s ease;
            overflow: hidden;
            opacity: 1;
            max-height: 8000px;
        }

        .cat-list.collapsed {
            max-height: 0;
            opacity: 0;
        }

        .drawing-board-container {
            width: 280px;
            height: 280px;
            border-radius: 1.5rem;
            position: relative;
            background: rgba(255, 255, 255, .42);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, .62);
            box-shadow: 0 8px 26px rgba(0, 0, 0, .05);
            overflow: hidden;
            flex-shrink: 0;
        }

        .grid-bg-standard {
            background-image: url('data:image/svg+xml;utf8,
            
        <svg xmlns="http://www.w3.org/2000/svg" width="280" height="280">
            <rect x="15" y="15" width="250" height="250" fill="none" stroke="%2386868b" stroke-width="1.5" stroke-opacity="0.3" rx="8"/>
            <line x1="15" y1="15" x2="265" y2="265" stroke="%2386868b" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
            <line x1="265" y1="15" x2="15" y2="265" stroke="%2386868b" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
            <line x1="140" y1="15" x2="140" y2="265" stroke="%2386868b" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>

        .drawing-board-container svg{position:absolute;top:0;left:0;width:100%!important;height:100%!important;z-index:10;cursor:crosshair;}
        .sidebar-transition{transition:transform .5s cubic-bezier(.25,1,.5,1),width .4s cubic-bezier(.25,1,.5,1),opacity .3s ease;}
        @media(min-width:768px){.desktop-closed{width:0!important;opacity:0!important;border-width:0!important;overflow:hidden!important;padding:0!important;}}
        input::placeholder{color:#86868b;}input:focus{background:rgba(255,255,255,.8)!important;box-shadow:0 0 0 3px rgba(0,102,204,.2);}
        @media(max-width:767px){.folder-container{padding:24px 16px;border-radius:28px;max-height:86vh;max-height:86dvh;overflow-y:auto;width:94%;}.folder-container h2{font-size:1.5rem;margin-bottom:1.25rem;}.lesson-card{padding:14px;border-radius:18px;}.lesson-card h3{font-size:1.05rem;}.lesson-card p{font-size:.7rem;}.lesson-card .w-12{width:2.25rem;height:2.25rem;margin-bottom:.5rem;border-radius:.9rem;}.drawing-board-container{width:min(280px,calc(100vw - 56px));height:min(280px,calc(100vw - 56px));}#header-words #word-hanzi{font-size:1.875rem;}#header-words #word-pinyin{font-size:1.1rem;}#example-ch{font-size:1rem;}#view-folder .folder-container{padding-bottom:92px;}#view-app .flex-1.p-3{padding-bottom:70px;}}
        @keyframes fadeInP{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .animate-fade-in{animation:fadeInP .4s ease-out forwards;}
        @keyframes shake{0%{transform:translateX(0)}25%{transform:translateX(-5px)}50%{transform:translateX(5px)}75%{transform:translateX(-5px)}100%{transform:translateX(0)}}
        @keyframes slideUpP{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
        .slide-up{animation:slideUpP .4s cubic-bezier(.16,1,.3,1) forwards;}
        @keyframes popP{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
        .pop{animation:popP .45s cubic-bezier(.16,1,.3,1) both;}
        .practice-btn{background:rgba(255,255,255,.6);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.68);box-shadow:0 5px 16px rgba(0,0,0,.04);transition:all .2s cubic-bezier(.25,1,.5,1);cursor:pointer;}
        .practice-btn:active:not(:disabled){transform:scale(.96);}
        .practice-btn-primary{background:linear-gradient(135deg,#0066cc,#005bb5);color:#fff!important;border:none;box-shadow:0 8px 20px rgba(0,102,204,.3);}
        .practice-btn-success{background:linear-gradient(135deg,#14b8a6,#0d9488);color:#fff!important;border:none;box-shadow:0 8px 20px rgba(20,184,166,.3);}
        .practice-btn-danger{background:linear-gradient(135deg,#f43f5e,#e11d48);color:#fff!important;border:none;box-shadow:0 8px 20px rgba(244,63,94,.3);}
        .practice-btn:disabled{background:rgba(255,255,255,.6);color:rgba(0,0,0,.3)!important;box-shadow:none;cursor:not-allowed;transform:none;}
        .practice-card{background:rgba(255,255,255,.55);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.65);box-shadow:0 5px 18px rgba(0,0,0,.035);transition:all .2s cubic-bezier(.25,1,.5,1);cursor:pointer;}
        .practice-card:hover{transform:translateY(-2px);box-shadow:0 12px 25px rgba(0,0,0,.08);}
        .practice-card.selected{border-color:#0066cc;background:rgba(0,102,204,.06);box-shadow:0 0 0 2px rgba(0,102,204,.25);transform:scale(.98);}
        .practice-card.matched{opacity:0;pointer-events:none;transform:scale(.9);}
        .practice-card.error{border-color:#f43f5e;background:rgba(244,63,94,.05);animation:shake .4s;}
        .word-block{background:rgba(255,255,255,.62);border:1px solid rgba(255,255,255,.7);box-shadow:0 3px 10px rgba(0,0,0,.04);cursor:pointer;transition:all .2s;}
        .word-block:hover{transform:translateY(-2px);}
        .word-block.used{background:rgba(0,0,0,.05);color:transparent!important;box-shadow:inset 0 2px 4px rgba(0,0,0,.05);pointer-events:none;border-color:transparent;}
        .word-block.used *{visibility:hidden;}
        .drop-zone{min-height:4rem;border-bottom:2px dashed rgba(148,163,184,.5);padding-bottom:.5rem;}
        .py-hint{display:block;font-size:.68rem;font-weight:700;color:#0066cc;opacity:.85;line-height:1.1;margin-top:2px;}
        .pt-hint{display:block;font-size:.68rem;font-weight:600;color:#86868b;line-height:1.15;margin-top:2px;}
        .gear-fab{position:fixed;bottom:16px;right:14px;z-index:70;width:46px;height:46px;border-radius:15px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.7);box-shadow:0 6px 20px rgba(0,0,0,.08);color:#0066cc;cursor:pointer;transition:transform .2s;}
        .gear-fab:active{transform:scale(.93) rotate(30deg);}
        .modal-overlay{position:fixed;inset:0;z-index:120;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(15,23,42,.35);backdrop-filter:blur(10px);}
        .modal-overlay.hidden{display:none;}
        .modal-sheet{width:100%;max-width:470px;max-height:88vh;max-height:88dvh;overflow-y:auto;border-radius:28px;padding:22px;background:rgba(255,255,255,.85);backdrop-filter:blur(30px) saturate(180%);border:1px solid rgba(255,255,255,.9);box-shadow:0 30px 70px rgba(0,0,0,.25);}
        .seg{display:flex;gap:8px;}
        .seg-btn{flex:1;padding:12px;border-radius:16px;font-weight:800;font-size:.85rem;border:1px solid rgba(0,0,0,.08);background:rgba(255,255,255,.6);color:#475569;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;}
        .seg-btn.on{background:linear-gradient(135deg,#0066cc,#3388ff);color:#fff;border-color:transparent;box-shadow:0 8px 18px rgba(0,102,204,.3);}
        .tgl{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;border-radius:16px;background:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.8);margin-bottom:8px;}
        .tgl-sw{width:46px;height:26px;border-radius:999px;background:rgba(0,0,0,.15);position:relative;transition:background .2s;flex-shrink:0;cursor:pointer;}
        .tgl-sw::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 2px 6px rgba(0,0,0,.2);}
        .tgl-sw.on{background:#0d9488;}.tgl-sw.on::after{left:23px;}
        .stat-card{border-radius:20px;padding:14px 8px;text-align:center;background:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.8);}
        .hub-item{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:13px 14px;border-radius:18px;background:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.85);margin-bottom:8px;cursor:pointer;transition:all .2s;}
        .hub-item:hover{transform:translateY(-1px);background:rgba(255,255,255,.85);}
        .hub-ico{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;}

        .pr-open{margin-top:10px;width:100%;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 10px;border-radius:14px;font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;background:linear-gradient(135deg,#0d9488,#14b8a6);color:#fff;border:none;cursor:pointer;box-shadow:0 6px 16px rgba(13,148,136,.3);transition:transform .15s;}
        .pr-open:active{transform:scale(.95);}
        .app-toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%) translateY(12px);z-index:140;background:rgba(15,23,42,.94);color:#fff;padding:10px 18px;border-radius:999px;font-weight:700;font-size:.85rem;box-shadow:0 10px 30px rgba(0,0,0,.3);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;}
        .app-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
        .ring-bg{stroke:rgba(0,0,0,.08);}

    const COMMON_WORDS = [['我们', 'wǒmen'], ['你们', 'nǐmen'], ['他们', 'tāmen'], ['大家', 'dàjiā'], ['什么', 'shénme'], ['怎么', 'zěnme'], ['可以', 'kěyǐ'], ['时候', 'shíhou'], ['觉得', 'juéde'], ['知道', 'zhīdào'], ['现在', 'xiànzài'], ['没有', 'méiyǒu'], ['一个', 'yí ge'], ['这个', 'zhège'], ['那个', 'nàge'], ['喜欢', 'xǐhuan'], ['东西', 'dōngxi'], ['一起', 'yìqǐ'], ['学生', 'xuésheng'], ['老师', 'lǎoshī'], ['朋友', 'péngyou'], ['为什么', 'wèishénme'], ['已经', 'yǐjīng'], ['电影', 'diànyǐng']];
    function buildPinyinMaps() {
        if (WORD_PY)
            return;
        WORD_PY = {};
        CHAR_PY = Object.assign({}, BASE_CHAR_PY);
        WORD_LIST = [];
        COMMON_WORDS.forEach(([w, p]) => {
            WORD_PY[w] = p;
            WORD_LIST.push(w);
        });
        database.forEach(d => {
            const w = onlyHanzi(d.w);
            if (w && !WORD_PY[w] && d.p && !/[…（）()·]/.test(d.w)) {
                WORD_PY[w] = d.p;
                WORD_LIST.push(w);
            }
            [[onlyHanzi(d.w), d.p], [onlyHanzi(d.ex_ch || ''), d.ex_py || '']].forEach(([h, p]) => {
                if (!h || !p)
                    return;
                const s = splitSyl(p);
                if (s.length === h.length) {
                    for (let i = 0; i < h.length; i++)
                        if (!CHAR_PY[h[i]])
                            CHAR_PY[h[i]] = s[i];
                }
            });
        });
        WORD_LIST.sort((a, b) => b.length - a.length);
    }
    function pinyinOf(hz) {
        buildPinyinMaps();
        const h = onlyHanzi(hz);
        if (!h)
            return '';
        if (WORD_PY[h])
            return WORD_PY[h];
        let out = [],
            ok = false;
        for (const c of h) {
            if (CHAR_PY[c]) {
                out.push(CHAR_PY[c]);
                ok = true;
            } else
                out.push('');
        }
        return ok ? out.join(' ').trim() : '';
    }
    // pinyin de uma frase inteira (segmenta em palavras conhecidas + caracteres)
    function pinyinSentence(zh) {
        buildPinyinMaps();
        const blocks = segmentZh(zh);
        const parts = blocks.map(b => WORD_PY[b] || pinyinOf(b) || '');
        return parts.filter(Boolean).join(' ');
    }
    function segmentZh(sentence) {
        buildPinyinMaps();
        const s = onlyHanzi(sentence);
        const b = [];
        let i = 0;
        while (i < s.length) {
            let hit = null;
            for (const w of WORD_LIST) {
                if (w.length > 1 && w.length <= 6 && s.startsWith(w, i)) {
                    hit = w;
                    break;
                }
            }
            if (hit) {
                b.push(hit);
                i += hit.length;
            } else {
                b.push(s[i]);
                i++;
            }
        }
        return b;
    }

    function sfx(ok) {
        if (!prefs.effects)
            return;
        try {
            _actx = _actx || new (window.AudioContext || window.webkitAudioContext)();
            const notes = ok ? [[523.25, 0], [659.25, .09], [783.99, .18]] : [[220, 0], [174.61, .12]];
            notes.forEach(([f, d]) => {
                const o = _actx.createOscillator(),
                    g = _actx.createGain();
                o.type = 'sine';
                o.frequency.value = f;
                g.gain.setValueAtTime(.0001, _actx.currentTime + d);
                g.gain.exponentialRampToValueAtTime(.18, _actx.currentTime + d + .02);
                g.gain.exponentialRampToValueAtTime(.0001, _actx.currentTime + d + .22);
                o.connect(g);
                g.connect(_actx.destination);
                o.start(_actx.currentTime + d);
                o.stop(_actx.currentTime + d + .25);
            });
        } catch (e) {}

    function poolFor(l, kind) {

    function usableWords(pool, maxLen) {
        maxLen = maxLen || 6;
        const seen = new Set();
        return pool.filter(d => {
            const h = onlyHanzi(d.w);
            if (!h || h.length < 1 || h.length > maxLen)
                return false;
            if (/[…()（）\/A-Za-z]/.test(d.w))
                return false;
            if (seen.has(h))
                return false;
            seen.add(h);
            return true;
        });

        return {

    }
    function mkChooseZh(it, w) {
        return {

    }

        return {

    function mkFill(e, w) {
        const g = onlyHanzi(e.w);
        if (!g || e.ex_ch.indexOf(g) === -1)
            return null;
        const o = sampleA(w.filter(x => {
            const h = onlyHanzi(x.w);
            return h !== g && e.ex_ch.indexOf(h) === -1;
        }), 3);
        if (o.length < 2)
            return null;
        return {

            entry: e,
            gap: g,
            options: shuffleA([e, ...o])

    }
    function mkOrder(e, w) {
        const b = segmentZh(e.ex_ch);
        if (b.length < 3 || b.length > 12)
            return null;
        const inS = new Set(b);
        const d = sampleA(w.filter(x => {
            const h = onlyHanzi(x.w);
            return h.length <= 4 && !inS.has(h) && e.ex_ch.indexOf(h) === -1;
        }), 2).map(x => onlyHanzi(x.w));

            answer: b,

    function buildTurn(l, kind) {
        if (kind === 'read') {
            const t = READINGS[l] || [];
            const acts = [];
            t.forEach(x => shuffleA(x.qs).forEach(q => acts.push({
                type: 'readQ',
                text: x,
                q: q
            })));
            return shuffleA(acts);
        }
        if (kind === 'game') {
            const acts = [];
            sampleA(DIALOGS[l] || [], 3).forEach(d => acts.push({
                type: 'dialog',
                d: d
            }));
            sampleA(CULTURE[l] || [], 3).forEach(c => acts.push({
                type: 'culture',
                c: c
            }));
            const w = usableWords(poolFor(l, 'all'), 6);
            if (w.length >= 4)
                acts.push(mkMatch(w));
            return shuffleA(acts);
        }
        const pool = poolFor(l, kind),
            words = usableWords(pool, kind === 'expr' ? 10 : 6),
            allW = usableWords(poolFor(l, 'all'), 6),
            sents = usableSents(pool);
        const acts = [];
        if (words.length >= 4) {
            acts.push(mkMatch(words));
            sampleA(words, 3).forEach(it => acts.push(mkChoosePt(it, words)));
            sampleA(words, 2).forEach(it => acts.push(mkChooseZh(it, words)));
            sampleA(words, 2).forEach(it => acts.push(mkListen(it, words)));
            sampleA(words.filter(x => onlyHanzi(x.w).length <= 4), 2).forEach(it => acts.push(mkTypeZh(it)));
        }
        sampleA(sents, 5).forEach((s, i) => {
            const a = (i % 2 === 0) ? mkFill(s, words.length >= 4 ? words : allW) : mkOrder(s, allW);
            if (a)
                acts.push(a);
        });
        if (kind === 'all') {
            if (DIALOGS[l])
                acts.push({
                    type: 'dialog',
                    d: sampleA(DIALOGS[l], 1)[0]
                });

                    type: 'culture',
                    c: sampleA(CULTURE[l], 1)[0]

                acts.push({

                    text: t,
                    q: sampleA(t.qs, 1)[0]

            fz = t.lines.map(l => l[0]).join('');
        const lh = t.lines.map(l => `<p class="chinese-text text-base md:text-lg font-medium text-[#1d1d1f] leading-relaxed">${l[0]}</p>${prefs.pinyin ? `<p class="py-hint" style="margin:0 0 6px;">${l[1]}</p>` : ''}`).join('');
        area.insertAdjacentHTML('beforeend', `<div class="reading-box w-full max-w-2xl mx-auto text-left"><div class="flex items-center justify-between mb-2"><span class="px-3 py-1 rounded-full text-[10px] font-extrabold uppercase tracking-widest bg-cyan-100 text-cyan-700 border border-cyan-200">课文 · Texto</span><div class="flex items-center gap-2"><span class="chinese-text text-sm font-bold text-[#86868b]">${t.title}</span>${audioBtn(fz)}</div></div>${lh}${prefs.trad ? `<div class="mt-3 pt-3 border-t border-white/60"><p class="text-[10px] uppercase tracking-widest text-[#86868b] font-bold mb-1">Tradução</p><p class="text-xs md:text-sm text-[#86868b] leading-relaxed">${t.pt}</p></div>` : ''}</div>`);
        area.insertAdjacentHTML('beforeend', promptCard(`<div class="flex items-center justify-center gap-2"><div class="chinese-text text-lg md:text-xl font-bold text-[#1d1d1f]">${a.q.q}</div>${audioBtn(a.q.q)}</div>${prefs.pinyin ? `<span class="py-hint">${a.q.qp}</span>` : ''}${prefs.trad ? `<span class="pt-hint">${a.q.qt}</span>` : ''}`));
        optionList(area, shuffleA(a.q.opts.map((o, i) => ({
            o: o,
            ok: i === a.q.ok
        }))), x => `<span class="chinese-text text-base md:text-lg font-bold leading-snug">${x.o[0]}</span>${prefs.pinyin ? `<span class="py-hint">${x.o[1]}</span>` : ''}${prefs.trad ? `<span class="pt-hint">${x.o[2]}</span>` : ''}`, x => {
            P.sel = x;
        });
    }
    function renderDialog(a, area) {
        const d = a.d;
        area.insertAdjacentHTML('beforeend', `<div class="w-full max-w-2xl mx-auto"><span class="px-3 py-1 rounded-full text-[10px] font-extrabold uppercase tracking-widest bg-pink-100 text-pink-700 border border-pink-200">对话 · Situação</span><div class="flex items-start gap-3 mt-3"><div class="w-10 h-10 rounded-full flex items-center justify-center text-white shrink-0" style="background:linear-gradient(135deg,#db2777,#ec4899);"><i data-lucide="user-round" class="w-5 h-5"></i></div><div class="dlg-bubble flex-1"><div class="flex items-center gap-2"><span class="chinese-text text-lg md:text-xl font-bold text-[#1d1d1f]">${d.a}</span>${audioBtn(d.a)}</div>${prefs.pinyin ? `<span class="py-hint">${d.ap}</span>` : ''}${prefs.trad ? `<span class="pt-hint">${d.at}</span>` : ''}</div></div><p class="text-xs text-slate-500 font-semibold mt-4 mb-1 text-center">Qual a resposta mais adequada?</p></div>`);
        optionList(area, shuffleA(d.opts.map((o, i) => ({
            o: o,
            ok: i === d.ok
        }))), x => `<span class="chinese-text text-base md:text-lg font-bold leading-snug">${x.o[0]}</span>${prefs.pinyin ? `<span class="py-hint">${x.o[1]}</span>` : ''}${prefs.trad ? `<span class="pt-hint">${x.o[2]}</span>` : ''}`, x => {
            P.sel = x;
            if (prefs.autoAudio)
                playZh(x.o[0]);
        });
        if (prefs.autoAudio)
            setTimeout(() => playZh(d.a), 350);
    }
    function renderCulture(a, area) {
        const c = a.c;
        area.insertAdjacentHTML('beforeend', promptCard(`<span class="px-3 py-1 rounded-full text-[10px] font-extrabold uppercase tracking-widest bg-amber-100 text-amber-700 border border-amber-200">文化 · Cultura</span><div class="text-base md:text-xl font-extrabold text-[#1d1d1f] leading-snug mt-3">${c.q}</div>`));
        optionList(area, shuffleA(c.opts.map((o, i) => ({
            o: o,
            ok: i === c.ok
        }))), x => `<span class="text-sm md:text-base font-bold leading-snug">${x.o}</span>`, x => {
            P.sel = x;
        });
    }
    function log(ok, zh, py, pt, your) {
        P.log.push({
            ok: !!ok,
            label: (pcEl('pcTitle') || {}).innerText || '',
            zh: zh || '',
            py: py || '',
            pt: pt || '',
            your: (your || '').trim()
        });
    }
    function normHanzi(s) {
        return (s || '').replace(/[^㐀-鿿]/g, '');
    }
    function pcCheck() {
        if (P.checking) {
            P.idx++;
            loadAct();
            return;
        }
        const a = P.acts[P.idx];
        let ok = false,
            zh = '',
            py = '',
            pt = '',
            your = '',
            audio = '';
        if (a.type === 'choosePt') {
            ok = P.sel === a.item.t;
            zh = onlyHanzi(a.item.w) || a.item.w;
            py = a.item.p;
            pt = a.item.t;
            your = P.sel || '';
            audio = zh;
        }
        else if (a.type === 'chooseZh' || a.type === 'listen') {
            ok = P.sel && onlyHanzi(P.sel.w) === onlyHanzi(a.item.w);
            zh = onlyHanzi(a.item.w) || a.item.w;
            py = a.item.p;
            pt = a.item.t;
            your = P.sel ? (onlyHanzi(P.sel.w) || P.sel.w) : '';
            audio = zh;
        }
        else if (a.type === 'typeZh') {
            const inp = pcEl('pcInput');
            const v = inp ? inp.value : '';
            ok = normHanzi(v) === onlyHanzi(a.item.w) && normHanzi(v).length > 0;
            zh = onlyHanzi(a.item.w) || a.item.w;
            py = a.item.p;
            pt = a.item.t;
            your = v;
            audio = zh;
        }
        else if (a.type === 'fillBlank') {
            ok = P.sel && onlyHanzi(P.sel.w) === a.gap;
            zh = a.entry.ex_ch;
            py = a.entry.ex_py;
            pt = a.entry.ex_pt;
            your = P.sel ? (onlyHanzi(P.sel.w) || P.sel.w) : '';
            audio = a.entry.ex_ch;
        }
        else if (a.type === 'orderSentence') {
            const u = Array.from(pcEl('pcDrop').children).map(x => x.querySelector('.chinese-text').innerText).join('');
            ok = u === a.answer.join('');
            zh = a.entry.ex_ch;
            py = a.entry.ex_py;
            pt = a.entry.ex_pt;
            your = u;
            audio = a.entry.ex_ch;
        }
        else if (a.type === 'readQ') {
            ok = P.sel && P.sel.ok;
            const co = a.q.opts[a.q.ok];
            zh = co[0];
            py = co[1];
            pt = co[2];
            your = P.sel ? P.sel.o[0] : '';
            audio = co[0];
        }
        else if (a.type === 'dialog') {
            ok = P.sel && P.sel.ok;
            const co = a.d.opts[a.d.ok];
            zh = co[0];
            py = co[1];
            pt = co[2];
            your = P.sel ? P.sel.o[0] : '';
            audio = co[0];
        }
        else if (a.type === 'culture') {
            ok = P.sel && P.sel.ok;
            zh = a.c.opts[a.c.ok];
            pt = a.c.note || '';
            your = P.sel ? P.sel.o : '';
            P.note = a.c.note || '';
        }
        else
            return;
        log(ok, zh, py, pt, your);
        P.checking = true;
        if (!ok)
            loseHeart();
        sfx(ok);
        if (audio && prefs.autoAudio)
            playZh(audio);
        showFb(ok, zh, py, pt);
    }
    function pcSkip() {
        if (P.checking)
            return;
        P.checking = true;
        loseHeart();
        sfx(false);
        const a = P.acts[P.idx];
        let zh = '',
            py = '',
            pt = '';
        if (a.type === 'fillBlank' || a.type === 'orderSentence') {
            zh = a.entry.ex_ch;
            py = a.entry.ex_py;
            pt = a.entry.ex_pt;
        }
        else if (a.type === 'readQ') {
            const co = a.q.opts[a.q.ok];
            zh = co[0];
            py = co[1];
            pt = co[2];
        }
        else if (a.type === 'dialog') {
            const co = a.d.opts[a.d.ok];
            zh = co[0];
            py = co[1];
            pt = co[2];
        }
        else if (a.type === 'culture') {
            zh = a.c.opts[a.c.ok];
            pt = a.c.note || '';
            P.note = a.c.note || '';
        }
        else if (a.type === 'match') {
            zh = 'Associe todos os pares';
        }
        else if (a.item) {
            zh = onlyHanzi(a.item.w) || a.item.w;
            py = a.item.p;
            pt = a.item.t;
        }
        log(false, zh, py, pt, '');
        showFb(false, zh, py, pt);
    }
    function loseHeart() {
        P.hearts--;
        pcEl('pcHearts').innerText = Math.max(0, P.hearts);
        if (P.hearts <= 0 && !P.ended) {
            P.ended = true;
            setTimeout(() => showSummary(false), 700);
        }
    }
    function showFb(ok, zh, py, pt) {
        const fb = pcEl('pcFeedback');
        pcEl('pcSkip').style.display = 'none';
        const c = pcEl('pcCheck');
        c.innerText = 'Continuar';
        c.disabled = false;
        c.classList.remove('practice-btn-primary');
        if (ok) {
            fb.className = 'absolute left-0 bottom-full w-full p-4 md:px-8 py-5 flex flex-col slide-up bg-teal-50/95 backdrop-blur-xl border-t border-teal-200 text-teal-900';
            pcEl('pcFbIcon').className = 'w-12 h-12 rounded-full flex items-center justify-center text-white bg-teal-500 shadow-md shrink-0';
            pcEl('pcFbIcon').innerHTML = '<i data-lucide="check" class="w-7 h-7"></i>';
            pcEl('pcFbTitle').innerText = ['很好! Muito bem!', '太棒了! Excelente!', '对了! Correto!'][Math.floor(Math.random() * 3)];
            pcEl('pcFbText').classList.add('hidden');
            const s = pcEl('pcFbSub');
            if (P.note) {
                s.innerText = P.note;
                s.classList.remove('hidden');
            } else
                s.classList.add('hidden');
            c.classList.add('practice-btn-success');
            c.classList.remove('practice-btn-danger');
        }
        else {
            fb.className = 'absolute left-0 bottom-full w-full p-4 md:px-8 py-5 flex flex-col slide-up bg-rose-50/95 backdrop-blur-xl border-t border-rose-200 text-rose-900';
            pcEl('pcFbIcon').className = 'w-12 h-12 rounded-full flex items-center justify-center text-white bg-rose-500 shadow-md shrink-0';
            pcEl('pcFbIcon').innerHTML = '<i data-lucide="x" class="w-7 h-7"></i>';
            pcEl('pcFbTitle').innerText = 'Resposta correta:';
            const t = pcEl('pcFbText');
            t.innerText = zh || '';
            t.classList.remove('hidden');
            const s = pcEl('pcFbSub');
            s.innerText = [py, pt].filter(Boolean).join(' — ');
            s.classList.toggle('hidden', !s.innerText);
            c.classList.add('practice-btn-danger');
            c.classList.remove('practice-btn-success');
        }
        lucide.createIcons();
    }
    function endTurn() {
        if (P.ended) {
            showSummary(false);
            return;
        }
        if (P.turn >= P.maxTurns) {
            showSummary(true);
            return;
        }
        pcProg();
        resetFooter();
        pcEl('pcSkip').style.display = 'none';
        pcEl('pcCheck').style.display = 'none';
        pcEl('pcTitle').innerText = '';
        const done = P.log.filter(x => x.ok).length;
        pcEl('pcArea').innerHTML = `<div class="flex flex-col items-center w-full max-w-md mx-auto pt-6 animate-fade-in text-center"><div class="w-20 h-20 rounded-[1.6rem] flex items-center justify-center text-white shadow-lg pop mb-4" style="background:linear-gradient(135deg,#0d9488,#14b8a6);"><i data-lucide="flag" class="w-9 h-9"></i></div><h2 class="text-2xl font-extrabold text-[#1d1d1f] tracking-tight">Turno ${P.turn} concluído!</h2><p class="text-sm text-[#86868b] font-semibold mt-2">Acertos: <b class="text-teal-600">${done}</b>/${P.log.length} · Corações: <b class="text-rose-500">${P.hearts}</b></p><div class="flex flex-col sm:flex-row gap-3 w-full mt-6"><button onclick="contTurn()" class="practice-btn practice-btn-primary flex-1 py-3.5 rounded-2xl font-bold uppercase tracking-wider text-sm flex items-center justify-center gap-2"><i data-lucide="play" class="w-4 h-4"></i>Continuar</button><button onclick="showSummary(true)" class="practice-btn flex-1 py-3.5 rounded-2xl font-bold uppercase tracking-wider text-sm text-slate-600 flex items-center justify-center gap-2"><i data-lucide="flag" class="w-4 h-4"></i>Finalizar</button></div></div>`;
        lucide.createIcons();
    }
    function contTurn() {
        P.turn++;
        P.acts = buildTurn(P.lesson, P.kind);
        P.idx = 0;
        if (!P.acts.length) {
            showSummary(true);
            return;
        }
        pcEl('pcTurn').innerText = 'Turno ' + P.turn + '/' + P.maxTurns;
        loadAct();
    }
    function ringSVG(pct, color) {
        const r = 52,
            c = 2 * Math.PI * r,
            off = c * (1 - pct / 100);
        return `<svg viewBox="0 0 120 120" class="w-28 h-28"><circle class="ring-bg" cx="60" cy="60" r="${r}" fill="none" stroke-width="12"/><circle cx="60" cy="60" r="${r}" fill="none" stroke="${color}" stroke-width="12" stroke-linecap="round" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 60 60)"/></svg>`;
    }
    function showSummary() {
        P.ended = true;
        const total = P.log.length,
            correct = P.log.filter(x => x.ok).length;
        pcEl('pcTitle').innerText = '';
        pcEl('pcProgress').style.width = '100%';
        pcEl('pcFeedback').classList.add('hidden');
        pcEl('pcSkip').style.display = 'none';
        const pct = total ? Math.round(correct / total * 100) : 0;
        const color = pct >= 80 ? '#14b8a6' : pct >= 50 ? '#3388ff' : '#f43f5e';
        const rows = P.log.map(x => `<div class="flex items-start gap-3 p-3 rounded-2xl ${x.ok ? 'bg-teal-50/95 border border-teal-200' : 'bg-rose-50/95 border border-rose-200'}"><div class="w-6 h-6 rounded-full flex items-center justify-center text-white shrink-0 ${x.ok ? 'bg-teal-500' : 'bg-rose-500'}"><i data-lucide="${x.ok ? 'check' : 'x'}" class="w-4 h-4"></i></div><div class="min-w-0 flex-1"><div class="text-[10px] uppercase tracking-wide font-bold text-[#86868b]">${x.label}</div><div class="chinese-text text-sm font-bold ${x.ok ? 'text-teal-900' : 'text-rose-900'} break-words">${x.zh}</div>${(x.py || x.pt) ? `<div class="text-[11px] text-[#86868b] break-words">${[x.py, x.pt].filter(Boolean).join(' — ')}</div>` : ''}${(!x.ok && x.your) ? `<div class="text-xs text-[#86868b]">Sua resposta: <span class="line-through chinese-text">${x.your}</span></div>` : ''}</div></div>`).join('');
        pcEl('pcArea').innerHTML = `<div class="flex flex-col items-center w-full max-w-xl mx-auto pt-1 pb-6 animate-fade-in"><div class="relative flex items-center justify-center pop">${ringSVG(pct, color)}<div class="absolute text-center"><div class="text-3xl font-extrabold text-[#1d1d1f]">${pct}%</div><div class="text-[10px] font-bold text-[#86868b] uppercase">${correct}/${total}</div></div></div><h2 class="text-2xl md:text-3xl font-extrabold text-[#1d1d1f] mt-4 tracking-tight">${pct >= 80 ? '太棒了! Excelente!' : (pct >= 50 ? '很好! Muito bem!' : 'Prática concluída!')}</h2><div class="w-full mt-6"><p class="text-[10px] uppercase tracking-widest text-[#86868b] font-bold mb-2">Gabarito — acertos e erros</p><div class="flex flex-col gap-2">${rows || '<p class="text-sm text-[#86868b]">Sem itens.</p>'}</div></div></div>`;
        lucide.createIcons();
        const c = pcEl('pcCheck');
        c.style.display = '';
        c.innerText = 'Concluir';
        c.disabled = false;
        c.classList.add('practice-btn-success');
        c.classList.remove('practice-btn-primary', 'practice-btn-danger');
        c.onclick = () => {
            P.active = false;
            closePracticeC();
        };
    }
    </script>
</body>
</html>
